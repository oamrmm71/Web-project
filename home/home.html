<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STYLEE Store</title>
  <link rel="stylesheet" href="../shared/shared.css" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>

  <header class="top-nav">
    <div class="logo" onclick="navigate('../home/home.html')">STYLEE</div>

    <nav class="nav-links">
      <button onclick="navigate('../home/home.html')">Home</button>
      <button onclick="scrollProducts()">Shop</button>
      <button onclick="navigate('../admin/admin.html')">Admin Panel</button>
      <button id="loginNav" onclick="navigate('../login/login.html')">Login</button>
      <button class="cart-pill" onclick="navigate('../cart/cart.html')">
        Cart <span id="cartCount">0</span>
      </button>
    </nav>
  </header>

  <section class="page fade-page" id="homePage">
    <div class="hero">
      <div class="hero-content">
        <small>SPRING 2026</small>
        <h1>Own your style. Break the rules.</h1>
        <p>Streetwear products with color choices, size selection, and cart flow.</p>
      </div>
    </div>

    <main class="main" id="shopSection">
      <div class="section-head">
        <h2>Shop Products</h2>

        <div class="filters">
          <input id="searchInput" placeholder="Search product" oninput="renderProducts()" />

          <select id="categoryFilter" onchange="renderProducts()">
            <option value="all">All categories</option>
          </select>

          <select id="genderFilter" onchange="renderProducts()">
            <option value="all">All genders</option>
            <option value="men">Men</option>
            <option value="women">Women</option>
          </select>
        </div>
      </div>

      <div class="product-grid" id="productGrid"></div>
    </main>
  </section>

  <div class="toast" id="toast"></div>

  <script src="../shared/data.js"></script>
  <script src="../shared/utils.js"></script>
  <script src="home.js"></script>
</body>
</html>
